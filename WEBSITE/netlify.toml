[build]
command = "npm ci && npm run build"
publish = "dist"

[build.environment]
NODE_VERSION = "20.6.1"

[functions]
directory = "netlify/functions"
node_bundler = "esbuild"

# The React application uses hash routing, so no SPA rewrite is needed. Keeping
# redirects out of /api ensures missing Function routes return a real 404.
